<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll System using JavaScript DOM</title>

<style>
:root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    --accent-green: #10b981;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

.container{
    width: 100%;
    max-width: 650px;
    background: var(--card-bg);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    border: 1px solid var(--border-color);
}

h1{
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    font-weight: 700;
    color: var(--text-main);
    transition: color 0.3s ease;
}

/* Form group wraps to give spacing since there are no labels */
input, select {
    width: 100%;
    padding: 12px 16px;
    margin-bottom: 16px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 15px;
    color: var(--text-main);
    outline: none;
    background-color: #fafafa;
    transition: all 0.3s ease;
}

input:focus, select:focus {
    border-color: var(--primary);
    background-color: #fff;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
}

input::placeholder {
    color: var(--text-muted);
}

button{
    padding: 14px;
    width: 100%;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
}

button:hover{
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 12px -2px rgba(79, 70, 229, 0.3);
}

button:active {
    transform: translateY(0);
}

.result{
    margin-top: 30px;
    padding: 25px;
    background: #f8fafc;
    border-radius: 12px;
    border: 1px solid var(--border-color);
}

.result h2 {
    font-size: 20px;
    color: var(--text-muted);
    text-align: center;
}

.highlight{
    color: var(--accent-green) !important;
    font-weight: 700;
    text-align: center;
    margin-bottom: 15px;
}

table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: #ffffff;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border-color);
}

th, td{
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border-color);
}

th {
    background-color: #f1f5f9;
    color: var(--text-main);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
}

td {
    font-size: 14px;
    color: #334155;
}

/* Align values neatly to the right side of the table */
th:nth-child(2), td:nth-child(2) {
    text-align: right;
}

.note {
    margin-top: 15px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    font-style: italic;
}
</style>

</head>
<body>

<div class="container">

<h1 id="title">Payroll Calculator</h1>

<input type="text" id="empName" placeholder="Employee Name">

<input type="number" id="hours" placeholder="Hours Worked">

<input type="number" id="rate" placeholder="Hourly Rate">

<select id="status">
    <option value="Regular">Regular</option>
    <option value="Contractual">Contractual</option>
    <option value="Part-Time">Part-Time</option>
</select>

<button onclick="computePayroll()">Compute Payroll</button>

<div class="result" id="output">
    <h2>Payroll Summary</h2>
</div>

</div>

<script>
function computePayroll(){

// getElementById()
let name=document.getElementById("empName").value;
let hours=document.getElementById("hours").value;
let rate=document.getElementById("rate").value;
let status=document.getElementById("status").value;

// Validation
if(name=="" || hours=="" || rate==""){
    alert("Complete all fields.");
    return;
}

// Payroll
let gross=hours*rate;

let tax=0;
if(gross>=50000)
    tax=gross*.20;
else if(gross>=30000)
    tax=gross*.15;
else
    tax=gross*.10;

// Allowance
let allowance=0;
if(status=="Regular")
    allowance=3000;
else if(status=="Contractual")
    allowance=1500;
else
    allowance=500;

let net=(gross-tax)+allowance;

// querySelector()
document.querySelector("#title").textContent="Payroll Successfully Computed";

// querySelectorAll()
let inputs=document.querySelectorAll("input");
inputs.forEach(function(box){
    box.style.background="#ffffdd";
});

// getElementsByClassName()
let result=document.getElementsByClassName("result")[0];

// innerHTML
result.innerHTML="";

// createElement()
let heading=document.createElement("h2");
heading.textContent="Employee Payroll";
heading.setAttribute("class","highlight");

// appendChild()
result.appendChild(heading);

// create Table
let table=document.createElement("table");
table.innerHTML=`
<tr>
<th>Description</th>
<th>Value</th>
</tr>

<tr>
<td>Name</td>
<td>${name}</td>
</tr>

<tr>
<td>Hours Worked</td>
<td>${hours}</td>
</tr>

<tr>
<td>Hourly Rate</td>
<td>₱${Number(rate).toFixed(2)}</td>
</tr>

<tr>
<td>Status</td>
<td>${status}</td>
</tr>

<tr>
<td>Gross Pay</td>
<td>₱${gross.toFixed(2)}</td>
</tr>

<tr>
<td>Tax</td>
<td>₱${tax.toFixed(2)}</td>
</tr>

<tr>
<td>Allowance</td>
<td>₱${allowance.toFixed(2)}</td>
</tr>

<tr>
<td><b>Net Pay</b></td>
<td><b>₱${net.toFixed(2)}</b></td>
</tr>
`;

result.appendChild(table);

// getElementsByTagName()
let cells=document.getElementsByTagName("tr");
for(let i=0;i<cells.length;i++){
    if(i%2==1){
        cells[i].style.fontWeight="bold";
    }
}

// removeChild()
let oldParagraph=document.querySelector(".note");
if(oldParagraph!=null){
    result.removeChild(oldParagraph);
}

// createElement()
let note=document.createElement("p");
note.textContent="Payroll generated successfully.";
note.setAttribute("class","note");
result.appendChild(note);

}
</script>

</body>
</html>
